<div class="parent-container">

    <h1 class="head-1">Counter Using Signal</h1>

    <p> {{ count() }} </p>

    <div>
        <button class="button-css" (click)="decreamentCount()"> - </button>
        <button class="button-css" (click)="resetCount()"> Reset </button>
        <button class="button-css" (click)="increamentCount()"> + </button>
    </div>

</div>
